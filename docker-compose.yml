services:
  # 1. الواجهة الأمامية (الموقع الأزرق الفخم)
  web:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro # ربط مجلدك المحلي بمجلد السيرفر
    networks:
      - shahd_network

  # 2. قاعدة البيانات (المخزن الدائم)
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mysecretpassword
      MYSQL_DATABASE: myapp_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - shahd_network

  # 3. لوحة التحكم (phpMyAdmin)
  admin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
    networks:
      - shahd_network

# تعريف الشبكة والذاكرة الدائمة
networks:
  shahd_network:

volumes:
  db_data:
